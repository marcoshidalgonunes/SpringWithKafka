server:
  port: 8082

spring:
  application:
    name: transaction-worker
    batch-interval: 1000
  datasource:
    driver-class-name: org.postgresql.Driver
    username: postgres
  profiles:
    active: local
    
kafka:
  producer-topic: transaction-processed
  consumer-topic: transaction-received  
  consumer-groupid: received-group
  dead-letter-topic: transaction-received-dlt